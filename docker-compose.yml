version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vanilla-crm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vanilla_crm
      POSTGRES_USER: vanilla
      POSTGRES_PASSWORD: vanilla_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vanilla -d vanilla_crm"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
