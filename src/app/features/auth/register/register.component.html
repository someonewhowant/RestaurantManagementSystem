<div class="auth-layout">
  <div class="auth-card">
    <div class="logo">
      <span class="logo-icon">💠</span>
      <span class="logo-text">Vanilla CRM</span>
    </div>
    <h2>Создать аккаунт</h2>
    <p class="subtitle">14 дней бесплатного доступа. Без привязки карты.</p>
    
    <form (submit)="onSubmit($event)" class="auth-form">
      <div class="form-group">
        <label>Имя или Название компании</label>
        <input type="text" name="name" [(ngModel)]="name" placeholder="ООО Вкусная Еда" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" [(ngModel)]="email" placeholder="owner@restaurant.com" required>
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" name="password" [(ngModel)]="password" placeholder="Мин. 8 символов" required>
      </div>

      <button type="submit" class="auth-button" style="margin-top: 16px;">Начать работу</button>
    </form>
    
    <div class="auth-footer">
      Уже есть аккаунт? <a routerLink="/auth/login">Войти</a>
    </div>
  </div>
</div>
