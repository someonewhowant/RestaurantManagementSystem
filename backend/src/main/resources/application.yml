server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: vanilla-crm

  profiles:
    active: dev

  # JPA / Hibernate (common for all profiles)
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

# JWT Configuration
app:
  jwt:
    secret: VanillaCrmSuperSecretKeyForJwtTokenGeneration2026MustBeAtLeast256BitsLong!
    expiration-ms: 86400000  # 24 hours

# SpringDoc / Swagger
springdoc:
  swagger-ui:
    operations-sorter: method
    tags-sorter: alpha

# Logging
logging:
  level:
    com.vanilla.crm: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
