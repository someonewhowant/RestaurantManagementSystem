# =============================================
#  DEV Profile — H2 Embedded (file-based)
# =============================================
spring:
  datasource:
    url: jdbc:h2:file:./data/vanilla-crm;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

  # H2 Console (dev only)
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

logging:
  level:
    com.vanilla.crm: DEBUG
    org.hibernate.SQL: DEBUG
