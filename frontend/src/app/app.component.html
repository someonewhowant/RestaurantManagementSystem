<div style="padding: 40px; max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px;">
  <h1>Restaurant CRM Design System</h1>
  <p style="color: var(--color-text-muted)">Базовые UI-компоненты загружены успешно.</p>
  
  <app-ui-card>
    <h2>Карточка: Управление столами</h2>
    <p style="margin-bottom: 16px;">Пример отображения стола.</p>
    
    <div style="display: flex; gap: 12px; margin-bottom: 24px;">
      <app-ui-badge color="success">Стол свободен</app-ui-badge>
      <app-ui-badge color="warning">Ожидает уборки</app-ui-badge>
      <app-ui-badge color="primary">Занят</app-ui-badge>
    </div>

    <div style="display: flex; gap: 12px;">
      <app-ui-button variant="primary">Открыть стол</app-ui-button>
      <app-ui-button variant="danger" size="sm">Отмена</app-ui-button>
      <app-ui-button variant="success">Чек оплачен</app-ui-button>
    </div>
  </app-ui-card>

  <router-outlet></router-outlet>
</div>
